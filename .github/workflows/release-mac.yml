name: Release (macOS signed + notarized)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to upload assets to (e.g. v1.0.51)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-sign-notarize:
    if: >-
      github.repository == 'Gryt-chat/gryt'
      && (github.event_name == 'workflow_dispatch'
          || startsWith(github.event.release.tag_name, 'v'))
    runs-on: [self-hosted, macOS]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_NOTARYTOOL_KEYCHAIN_PROFILE: ${{ secrets.APPLE_NOTARYTOOL_KEYCHAIN_PROFILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch client submodule
        run: git submodule update --init packages/client

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/client
        run: npm install

      - name: Build native audio capture binary
        working-directory: packages/client
        run: bash native/audio-capture/build.sh

      - name: Import signing certificate
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "${{ secrets.MACOS_CERT_P12_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "${{ secrets.MACOS_CERT_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build renderer + package (macOS)
        working-directory: packages/client
        shell: bash
        run: |
          ELECTRON=1 npx vite build
          npx electron-builder --mac --publish never

      - name: Upload mac assets to GitHub Release
        working-directory: packages/client
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ -z "$TAG" ]]; then
            TAG="${{ inputs.tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            exit 1
          fi

          shopt -s nullglob
          ASSETS=(
            "release/"*"-mac-"*.dmg
            "release/"*"-mac-"*.zip
            "release/"*"-mac-"*.zip.blockmap
            "release/latest-mac.yml"
          )
          shopt -u nullglob

          if [[ "${#ASSETS[@]}" -eq 0 ]]; then
            echo "No mac assets found in packages/client/release/"
            ls -la release || true
            exit 1
          fi

          gh release upload "$TAG" "${ASSETS[@]}" --repo "${{ github.repository }}" --clobber

